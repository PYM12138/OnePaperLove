spring:
  profiles:
    active: dev  # 这里填 dev 就会加载 application-dev.yml；填 prod 就会加载 prod
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      # 初始化大小，最小，最大
      initial-size: 5
      min-idle: 5
      max-active: 20
      # 配置获取连接等待超时的时间
      max-wait: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存时间
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      # 打开 PSCache，并且指定每个连接上 PSCache 的大小
      pool-prepared-statements: false
      max-pool-prepared-statement-per-connection-size: -1
      # 配置监控统计拦截的 Filter，去掉后监控界面 SQL 无法统计，wall 用于防火墙
      filters: stat,wall,slf4j #slf4j是日志监控。同步web端页面的sql信息到控制台输出
      # 通过 connection-properties 属性打开 mergeSql 功能；慢 SQL 记录
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=500;
      # 配置 DruidStatFilter  过滤设置
      web-stat-filter:
        enabled: false
        url-pattern: /*
        exclusions: .js,*.gif,*.jpg,*.bmp,*.png,*.css,*.ico,/druid/*
      # 配置 DruidStatViewServlet web端监控页面
      stat-view-servlet:
        enabled: false
        url-pattern: /druid/*
        # IP 白名单，没有配置或者为空，则允许所有访问
        allow: 127.0.0.1
        # IP 黑名单，若白名单也存在，则优先使用
        deny: 192.168.31.253
        # 禁用 HTML 中 Reset All 按钮
        reset-enable: false
        # 登录用户名/密码
#        login-username: admin
#        login-password: 123456
  thymeleaf:
    cache: false   # 开发时可缓存 false，生产可单独覆盖
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 100MB

server:
  address: 0.0.0.0   # 允许外部访问
  port: 8080

pagehelper:
  auto-dialect: true
  reasonable: true
  support-methods-arguments: true

mybatis:
  configuration:
    map-underscore-to-camel-case: true