name: Docker Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven' # 👈 顺手开启 Maven 缓存，下次构建快飞起

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 1. 登录 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 2. 构建镜像并推送到 Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 格式：用户名/项目名:版本号
          tags: ${{ secrets.DOCKER_USERNAME }}/mingblog:latest

      # 3. SSH 登录服务器，让 Docker 换新装
      - name: Remote Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /mingblog
            # 拉取最新的镜像（只下载改动的部分，极快）
            docker compose pull blog-app
            # 强制根据新镜像重启容器
            docker compose up -d --force-recreate blog-app
