name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests  # 👈 加上这个参数，忽略maven的单元测试暂时用来通过github actions的执行流程

      - name: Upload JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "target/MingBlog-0.0.1-SNAPSHOT.jar"
          target: "/mingblog/"
          strip_components: 1   # 去除 target/ 目录

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /mingblog
            # 可选：备份旧 JAR
            cp MingBlog-0.0.1-SNAPSHOT.jar MingBlog-0.0.1-SNAPSHOT.jar.bak
            # 重启应用容器
            docker compose restart blog-app
            echo "Deployment completed."