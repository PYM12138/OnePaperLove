<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{common/common.css}">
    <title>归档 | 分类与时间</title>
    <style>
        /* 恢复自定义字体 */

        /* 导航栏样式 */

        /* 切换按钮 */
        .btn-group-toggle .btn {
            font-family: 'al-Regular', sans-serif;
            border-radius: 20px;
            margin-right: 10px;
            padding: 8px 16px;
            transition: all 0.3s ease;
        }

        .btn-group-toggle .btn.active {
            background-color: #007bff;
            color: #fff;
            border-color: #007bff;
        }

        .btn-group-toggle .btn:not(.active) {
            background-color: #fff;
            color: #343a40;
            border-color: #dee2e6;
        }

        /* 左侧分类栏 */
        #archive_left .nav-pills {
            background-color: #fff;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #archive_left .nav-link {
            font-family: 'al-Regular';
            color: #343a40;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        #archive_left .nav-link:hover,
        #archive_left .nav-link.active {
            background-color: #007bff;
            color: #fff;
        }

        /* 右侧卡片 */
        #archive_right .card {
            border: none;
            border-radius: 10px;
            margin-bottom: 20px;
            background-color: #fff;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        #archive_right .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        #archive_right .card-title a {
            font-family: 'al-SemiBold';
            color: #343a40;
            text-decoration: none;
            font-size: 1.2rem;
        }

        #archive_right .card-title a:hover {
            color: #007bff;
        }

        #archive_right .badge {
            font-family: 'al-Light';
            font-size: 0.85rem;
            margin-right: 8px;
        }

        #archive_right .badge-info {
            background-color: #17a2b8;
        }

        /* 排序图标 */
        #sort i.custom-icon {
            font-size: 1.5rem;
            color: #6c757d;
            transition: color 0.3s ease;
        }

        #sort i.custom-icon:hover {
            color: #007bff;
        }

        /* 响应式调整 */
        @media (max-width: 767.98px) {
            #archive_left {
                margin-bottom: 20px;
            }

            #archive_right {
                padding-left: 0;
                padding-right: 0;
            }

            #sort {
                display: none;
            }
        }


    </style>
</head>
<body>
<!-- 导航栏 -->
<div th:replace="common/navbar :: #navbar_1"></div>


<div class="container pt-5 mt-4">
    <!-- 分类/时间切换按钮 -->
    <div class="btn-group btn-group-toggle mt-3" data-toggle="buttons">
        <label class="btn btn-outline-dark active">
            <input type="radio" name="options" id="btn1" autocomplete="off" checked>
            <i class="fa fa-folder-open mr-1"></i> 分类
        </label>
        <label class="btn btn-outline-secondary">
            <input type="radio" name="options" id="btn2" autocomplete="off">
            时间 <i class="fa fa-clock-o mr-1"></i>
        </label>
    </div>

    <div class="row mt-4">
        <!-- 左侧分类栏 -->
        <aside id="archive_left" class="col-md-3 mb-3">
            <div class="nav flex-column nav-pills bg-white p-3 shadow rounded" id="v-pills-tab" role="tablist"
                 aria-orientation="vertical">
                <!-- 动态生成 -->
            </div>
        </aside>

        <!-- 右侧文章内容 -->
        <main id="archive_right" class="col-md-8">
            <div class="tab-content" id="v-pills-tabContent">
                <!-- 动态生成 -->
            </div>
        </main>

        <!-- 右侧排序图标 -->
        <div id="sort" class="col-md-1 d-none d-md-block pt-2">
            <i class="fa fa-sort-amount-desc custom-icon" aria-hidden="true"></i>
        </div>
    </div>
</div>


<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
<script th:src="@{common/common.js}"></script>

<script>

    $(function () {
        // 默认加载分类视图
        setupToggleButtons();
        loadArchive('category'); // 主动加载默认分类数据
    });

    // 设置分类/时间切换按钮
    function setupToggleButtons() {
        $('.btn-group-toggle .btn').on('click', function () {
            $('.btn-group-toggle .btn').removeClass('active btn-dark').addClass('btn-outline-secondary');
            $(this).addClass('active btn-dark').removeClass('btn-outline-secondary');
            const mode = $(this).find('input').attr('id') === 'btn1' ? 'category' : 'month';
            loadArchive(mode);
        });
    }

    // 加载归档数据
    function loadArchive(mode) {
        //立即清空，防止重复 append
        $('#v-pills-tab').empty(); // 更准确，直接操作真正放导航的容器
        $('#archive_right .tab-content').empty().hide();
        $.ajax({
            url: '/archive/group',
            type: 'GET',
            data: {mode: mode},
            dataType: 'json',
            success: function (groupedData) {
                const containers = {};

                // 创建 tab-pane 和导航项
                $.each(groupedData, function (key, articles) {
                    const sanitizedKey = sanitizeKey(key);

                    if (!containers[key]) {
                        containers[key] = $('<div>', {
                            class: 'tab-pane fade',
                            id: `v-pills-${sanitizedKey}`,
                            role: 'tabpanel',
                            'aria-labelledby': `v-pills-${sanitizedKey}-tab`
                        });
                        createNavItem(key, mode);
                    }

                    articles.forEach(article => {
                        appendContent(containers[key], article, mode, key);
                    });
                });

                $.each(containers, function (key, container) {
                    $('#archive_right .tab-content').append(container);
                });

                // 激活第一个
                const firstNav = $('#archive_left .nav-link:first');
                const firstPane = $('#archive_right .tab-pane:first');
                if (firstNav.length && firstPane.length) {
                    firstNav.addClass('active').attr('aria-selected', 'true');
                    firstPane.addClass('show active');
                }

                $('#archive_right .tab-content').fadeIn(300);

                // 注册点击事件
                $('#archive_left .nav-link').off('click').on('click', function (e) {
                    e.preventDefault();
                    $('#archive_left .nav-link').removeClass('active').attr('aria-selected', 'false');
                    $('#archive_right .tab-pane').removeClass('show active').fadeOut(200, function () {
                        const target = $(e.target).attr('href');
                        $(target).addClass('show active').fadeIn(300);
                        $(e.target).addClass('active').attr('aria-selected', 'true');
                    });
                });
            },
            error: function (err) {
                console.error('归档数据加载失败：', err);
                $('#archive_right .tab-content')
                    .html('<div class="text-danger p-3">归档数据加载失败</div>')
                    .fadeIn(300);
            }
        });
    }


    // 创建左侧导航项
    function createNavItem(key, mode) {
        const sanitizedKey = sanitizeKey(key);
        if (document.getElementById(`v-pills-${sanitizedKey}-tab`)) return;

        const iconClass = mode === 'month' ? 'calendar' : 'hashtag';

        const navItem = $('<a>', {
            class: 'nav-link',
            id: `v-pills-${sanitizedKey}-tab`,
            'data-toggle': 'pill',
            href: `#v-pills-${sanitizedKey}`,
            role: 'tab',
            'aria-controls': `v-pills-${sanitizedKey}`,
            'aria-selected': 'false',
            html: `<i class="fa fa-${iconClass} mr-1"></i>${key}`
        });

        $('#v-pills-tab').append(navItem); // 直接定位
    }


    // 清理键名以避免无效ID
    function sanitizeKey(str) {
        if (!str) return 'unknown';
        return str.replace(/[^\w\u4e00-\u9fa5]/g, '_'); // ✅ 保留中文
    }

    // 添加内容到右侧容器
    function appendContent(container, data, mode, key) {
        console.log(data); // 确认结构
        const title = data.title || '无标题';
        const categoryName = data.category?.categoryName || '未分类';
        const publishDate = data.publishDate || '未知时间';
        const type = data.type || '未知类型';
        const tagList = (Array.isArray(data.tags) && data.tags.length > 0)
            ? data.tags.map(tag => tag.tagName).join(', ')
            : '无标签';

        // 根据文章类型设定 badge 的样式类
        let badgeClass = 'badge-secondary'; // 默认

        if (type === '原创') {
            badgeClass = 'badge-info';
        } else if (type === '转载') {
            badgeClass = 'badge-danger';
        } else if (type === '分享') {
            badgeClass = 'badge-success';
        }

        // const sanitizedKey = sanitizeKey(mode === 'category' ? categoryName : key);

        const content = `
        <div class="card mt-2 shadow-sm">
            <div class="card-body">
                <h5 class="card-title">
                    <a href="/article/${data.articleId}" class="text-dark">${title}</a>
                    <div class="float-right"><i class="bi bi-pin-angle text-success mr-1"></i>${tagList}</div>
                </h5>
                <hr>
                <p class="card-text">
                    <span class="badge ${badgeClass}">${type}</span>
                    <span class="badge badge-light text-secondary"><i class="fa fa-calendar mr-1"></i>${publishDate}</span>
                    <span class="badge badge-light text-secondary"><i class="fa fa-folder-open mr-1"></i>${categoryName}</span>
                    <span class="badge badge-light text-secondary"><i class="fa fa-commenting mr-1"></i>评论：0</span>
                    <span class="badge badge-light text-secondary"><i class="fa fa-eye mr-1"></i>访问：0</span>
                </p>
            </div>
        </div>
    `;
        container.append(content);
    }


</script>
</body>
</html>
