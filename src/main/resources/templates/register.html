<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>一纸鸳语 | 注册</title>

    <!-- AdminLTE + FontAwesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css" />




    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .register-box {
            max-width: 500px;
        }

        .card {
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .card-header {
            background-color: #1a73e8;
            color: white;
            border-top-left-radius: 1rem;
            border-top-right-radius: 1rem;
        }

        .card-header h1 {
            font-size: 1.75rem;
            font-weight: 600;
        }

        .form-control {
            border-radius: 0.5rem;
        }

        .btn-primary {
            border-radius: 0.5rem;
            background-color: #1a73e8;
            border: none;
        }

        .btn-primary:hover {
            background-color: #1761c4;
        }

        .social-auth-links .btn {
            border-radius: 0.5rem;
        }

        .login-box-msg {
            font-size: 1rem;
            font-weight: 500;
            color: #6c757d;
        }
    </style>


</head>
<body class="hold-transition register-page">

<div class="register-box">
    <div class="card card-outline card-primary">
        <div class="card-header text-center">
            <h1>一纸鸳语</h1>
        </div>
        <div class="card-body">
            <p class="login-box-msg">注册您的新账户</p>

            <form action="/doRegister" method="post">
                <div class="input-group mb-3">
                    <input type="text" class="form-control" name="fullname" placeholder="姓名" required>
                    <div class="input-group-append">
                        <div class="input-group-text"><i class="fas fa-user"></i></div>
                    </div>
                </div>

                <div class="input-group mb-3">
                    <input type="email" class="form-control" name="email" placeholder="邮箱" required>
                    <div class="input-group-append">
                        <div class="input-group-text"><i class="fas fa-envelope"></i></div>
                    </div>
                </div>

                <div class="input-group mb-3">
                    <input type="password" class="form-control" name="password" placeholder="密码" required>
                    <div class="input-group-append">
                        <div class="input-group-text"><i class="fas fa-lock"></i></div>
                    </div>
                </div>

                <div class="input-group mb-3">
                    <input type="password" class="form-control" name="confirm" placeholder="确认密码" required>
                    <div class="input-group-append">
                        <div class="input-group-text"><i class="fas fa-lock"></i></div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-8">
                        <div class="icheck-primary">
                            <input type="checkbox" id="agreeTerms" name="terms" required>
                            <label for="agreeTerms">
                                我同意 <a href="#">服务条款</a>
                            </label>
                        </div>
                    </div>
                    <div class="col-4">
                        <button type="submit" class="btn btn-primary btn-block">注册</button>
                    </div>
                </div>
            </form>

            <div class="social-auth-links text-center mt-3">
                <p>- 或使用社交账号 -</p>
                <a href="#" class="btn btn-block btn-primary">
                    <i class="fab fa-facebook mr-2"></i> Facebook 注册
                </a>
                <a href="#" class="btn btn-block btn-danger">
                    <i class="fab fa-google mr-2"></i> Google 注册
                </a>
            </div>

            <p class="mt-3 text-center">
                已有账户？ <a href="login.html">立即登录</a>
            </p>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>


</body>
</html>
