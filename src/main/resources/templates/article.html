<!DOCTYPE html>
<html lang="zh-CN" xmlns:th=http://www.thymeleaf.org>
<head>
    <!-- 必须的 meta 标签 -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!--    留给爬虫抓取的文章标题标题和内容-->
    <title th:text="${articleTitle}"></title>
    <meta name="description" th:content="${articleSummary}">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Cache-Control" content="no-siteapp"/>
    <meta name="keywords" content="学习,自学,java后端,学习经验分享,工作,生活,随想,博客">

    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/common/common.css}">

    <link href="css/bootstrap.min.css" rel="stylesheet" th:href="@{/editormd/css/editormd.preview.min.css}">
    <link href="css/bootstrap.min.css" rel="stylesheet" th:href="@{/editormd/css/editormd.min.css}">

    <title>文章页面</title>

    <style>

        #article_content p {
            font-family: al-RegularL3;
            font-size: 18px; /* 增大正文字体 */
        }

        .blockquote {
            background-color: #f8f9fa;
            border-left: 5px solid #dee2e6;
            padding: 10px 20px;
            width: 300px;
            height: 100px;
            font-size: 18px; /* 增大引用块字体 */
        }

        .blockquote-footer {
            background-color: #f8f9fa;
            border-top: 1px solid #dee2e6;
            padding: 5px 20px;
            font-size: 16px; /* 增大引用块脚注字体 */
        }

        #float_card p {
            font-size: 16px; /* 增大浮动卡片文字 */
        }

        #float_card span {
            font-family: al-Light;
            font-size: 16px; /* 增大浮动卡片提示文字 */
        }

        #tags span {
            font-size: 20px; /* 增大标签字体 */
        }

        #article_top h3 {
            font-size: 28px; /* 增大文章标题字体 */
        }

        .markdown-body {
            font-size: 18px; /* 增大 Markdown 内容的默认字体大小 */
        }

        .markdown-body p {
            font-family: al-RegularL3;
            font-size: 18px; /* 增大 Markdown 段落字体 */
            line-height: 1.6; /* 增加行间距以提高可读性 */
        }

        .markdown-body h1 {
            font-size: 28px; /* 增大一级标题字体 */
        }

        .markdown-body h2 {
            font-size: 24px; /* 增大二级标题字体 */
        }

        .markdown-body h3 {
            font-size: 20px; /* 增大三级标题字体 */
        }

        .markdown-body ul, .markdown-body ol {
            font-size: 18px; /* 增大列表字体 */
        }

        .markdown-body code {
            font-size: 16px; /* 增大代码块字体 */
        }
        #article_content p, .markdown-body p {
            font-family: al-RegularL3;
            font-size: 18px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<!-- 导航栏 -->
<div th:replace="common/navbar :: #navbar_1"></div>

<!--文章内容-->
<div class="container pt-5">
    <div class="row">
        <!--开头配图-->
        <div class="col-10 offset-1 mt-3 text-center">
            <!--<img src="" alt="" th:src="@{/img/test.jpg}"  data-toggle="tooltip" title="绿色的光在你头上更绿了。"   class="img-fluid img-thumbnail">-->
        </div>
        <div class="col-12 mt-3 text-center">
            <!--阅读提示框-->
        <!--    <div class="fixed-top mt-5 d-none d-lg-block offset-10 ">
                <div id="float_card" class="card mt-5 mr-3 mr-xl-3  shadow ">
                    <div class="card-body  text-left ">
                        &lt;!&ndash;TODO 文章阅读目录未完成&ndash;&gt;
                        <h5 class="card-title">目录</h5>
                        <span class="" style="font-size: 14px;">（本文共1200字，阅读需要12分钟，需要些许耐心哦~）</span>

                        <p class="card-text">2.what do you mean?</p>
                        <p class="card-text">3.How dare you!</p>
                    </div>
                </div>
            </div>-->
            <div id="article">
                <!--文章页顶部-->
                <div id="article_top"><!--
                    <h3>SpringBoot的初步使用</h3>
                    <div id="" class="mb-2 pt-2 pb-2">
                        <div class="badge badge-info font-weight-light mr-2">原创</div>
                        <div class="badge font-weight-light text-secondary mr-2">
                            <i class="fa fa-calendar-minus-o mr-1 " aria-hidden="true"></i>2023-6-10
                        </div>
                        <div class="badge font-weight-light text-secondary">
                            <i class="fa fa-folder-open-o mr-1 " aria-hidden="true"></i> 我的故事
                        </div>
                    </div>-->
                </div>
                <!--文章页中部-->
                <div id="article_mid" class=" col-10 offset-1">
                    <div id="wordsView">
                        <textarea style="display:none;" name="editormd-markdown-doc" id="mdText"></textarea>
                    </div>
                </div>

                <!--文章页底部-->
                <div class="article_bottom">
                    <hr>
                    <div id="tags">
                        <!--  <span class="font-weight-light text-secondary"><i class="bi bi-pin-angle text-success mr-1"></i>随笔</span>
                          <span class="font-weight-light text-secondary"><i class="bi bi-pin-angle text-success mr-1"></i>心情</span>-->

</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/common/common.js}"></script>

<!--editormd所需要的组件-->
<script src="js/jquery-3.3.1.js" th:src="@{/editormd/editormd.min.js}"></script>
<script src="path-to-marked/marked.min.js " th:src="@{/editormd/lib/marked.min.js}"></script>
<script src="path-to-marked/marked.min.js " th:src="@{/editormd/lib/prettify.min.js}"></script>
<script src="path-to-marked/marked.min.js " th:src="@{/editormd/lib/raphael.min.js}"></script>
<script src="path-to-marked/marked.min.js " th:src="@{/editormd/lib/underscore.min.js}"></script>
<script src="path-to-marked/marked.min.js " th:src="@{/editormd/lib/sequence-diagram.min.js}"></script>
<script src="path-to-marked/marked.min.js " th:src="@{/editormd/lib/flowchart.min.js}"></script>
<script src="path-to-marked/marked.min.js " th:src="@{/editormd/lib/jquery.flowchart.min.js}"></script>


<script>
    var articleId = "";
    $(function () {
        //先获取articleId
        $.ajax({
            type: 'HEAD', // 获取头信息，type=HEAD即可
            url: window.location.href,
            async: false,
            success: function (data, status, xhr) {
                articleId = xhr.getResponseHeader("articleId");
            }
        });
        getArticle();
    })

    function inputArticleContent(data) {
        $('#article_top').html('');

        let badgeClass = 'badge-secondary'; // 默认样式
        if (data['articleType'] === '原创') {
            badgeClass = 'badge-info';
        } else if (data['articleType'] === '转载') {
            badgeClass = 'badge-danger';
        } else if (data['articleType'] === '分享') {
            badgeClass = 'badge-success';
        }

        var articleTopContent =
            '<h3>' + data['articleTitle'] + '</h3>' +
            '<div class="mb-2 pt-2 pb-2">' +
            '<div class="badge ' + badgeClass + ' font-weight-light mr-2">' + data['articleType'] + '</div>' +
            '<div class="badge font-weight-light text-secondary mr-2">' +
            '<i class="fa fa-calendar-minus-o mr-1" aria-hidden="true"></i>' + data['articlePublishDate'] +
            '</div>' +
            '<div class="badge font-weight-light text-secondary">' +
            '<i class="fa fa-folder-open-o mr-1" aria-hidden="true"></i>' + data['categoryName'] +
            '</div>' +
            '</div>';

        $('#article_top').append(articleTopContent);

        if (data['tags'] && data['tags'].length > 0) {
            data['tags'].forEach(function (tag) {
                var tagContent = '<span class="text-secondary mr-2"><i class="bi bi-pin-angle text-success mr-1"></i>' + tag['tagName'] + '</span>';
                $('#tags').append(tagContent);
            });
        } else {
            var noTagContent = '<span class="text-secondary"><i class="bi bi-pin-angle text-success mr-1"></i>无标签</span>';
            $('#tags').append(noTagContent);
        }

        $("#mdText").text(data['articleContent']);
        editormd.markdownToHTML("wordsView", {
            htmlDecode: "true",
            emoji: true,
            taskList: true,
            tex: true,
            flowChart: true,
            sequenceDiagram: true
        });
    }


    function getArticle() {
        // $('#center-cards-content').empty()
        $.ajax({
            type: 'GET',
            url: '/findArticleById',
            dataType: 'json',
            async: false,
            data: {
                articleId: articleId
            },
            success: function (data) {
                console.log(data)
                inputArticleContent(data['data'])

            },
            error: function () {
                alert("请求数据失败！")
            }
        });
    }


    //手机屏幕点击导航之后自动折叠导航栏
    /*
        $('.navbar-nav>li>a').on('click', function () {
            $('.navbar-collapse').collapse('hide');
        });
        $(function () {
            $('[data-toggle="tooltip"]').tooltip()
        })
    */


</script>
