<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- sidebar fragment -->
<div th:fragment="sidebar">
    <!-- Main Sidebar Container 侧边导航-->
    <aside class="main-sidebar sidebar-light-info elevation-3">
        <!-- Brand Logo -->
        <a th:href="@{/}" class="brand-link">
            <span class="brand-text font-weight-light">一纸鸳语</span>
        </a>

        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Sidebar user panel (optional) -->
            <div class="user-panel mt-3 pb-3 mb-3 d-flex">
                <div class="image">
                    <img th:src="@{/adminLTE/img/user2-160x160.jpg}" class="img-circle elevation-2" alt="User Image">
                </div>
                <div class="info">
                    <p class="d-block">欢迎回来，管理大大！</p>
                </div>
            </div>

            <!-- Sidebar Menu -->
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">

                    <li class="nav-item">
                        <a th:href="@{/admin/index}" class="nav-link">
                            <i class="fa fa-bar-chart mr-1" aria-hidden="true"></i>
                            <p>数据统计</p>
                        </a>
                    </li>

                    <li class="nav-item menu-close">
                        <a href="#" class="nav-link">
                            <i class="fa fa-file-code-o mr-1" aria-hidden="true"></i>
                            <p>文章管理 <i class="right fa fa-angle-left"></i></p>
                        </a>
                        <ul class="nav nav-treeview">
                            <li class="nav-item">
                                <a th:href="@{/admin/article/edit}" class="nav-link">
                                    <i class="fa fa-circle-o nav-icon"></i>
                                    <p>发表文章</p>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a th:href="@{/admin/article/mana}" class="nav-link">
                                    <i class="fa fa-circle-o nav-icon"></i>
                                    <p>管理文章</p>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a th:href="@{/admin/article/log}" class="nav-link">
                                    <i class="fa fa-circle-o nav-icon"></i>
                                    <p>文章操作记录</p>
                                </a>
                            </li>
                        </ul>
                    </li>

                    <li class="nav-item menu-close">
                        <a href="#" class="nav-link">
                            <i class="fa fa-user-o mr-1" aria-hidden="true"></i>
                            <p>用户信息 <i class="right fa fa-angle-left"></i></p>
                        </a>
                        <ul class="nav nav-treeview">
                            <li class="nav-item">
                                <a th:href="@{/admin/user/mana}" class="nav-link">
                                    <i class="fa fa-circle-o nav-icon"></i>
                                    <p>用户管理</p>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a th:href="@{/admin/user/log}" class="nav-link">
                                    <i class="fa fa-circle-o nav-icon"></i>
                                    <p>用户操作记录</p>
                                </a>
                            </li>
                        </ul>
                    </li>

                    <li class="nav-item menu-close">
                        <a href="#" class="nav-link">
                            <i class="fa fa-commenting-o mr-1" aria-hidden="true"></i>
                            <p>评论管理 <i class="right fa fa-angle-left"></i></p>
                        </a>
                        <ul class="nav nav-treeview">
                            <li class="nav-item">
                                <a th:href="@{/admin/comment/new}" class="nav-link">
                                    <i class="fa fa-circle-o nav-icon"></i>
                                    <p>新增评论</p>
                                    <span class="right badge badge-danger">New</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a th:href="@{/admin/comment/history}" class="nav-link">
                                    <i class="fa fa-circle-o nav-icon"></i>
                                    <p>历史评论</p>
                                </a>
                            </li>
                        </ul>
                    </li>

                    <li class="nav-item">
                        <a th:href="@{/admin/log}" class="nav-link">
                            <i class="fa fa-server mr-1" aria-hidden="true"></i>
                            <p>网站日志</p>
                        </a>
                    </li>

                </ul>
            </nav>
        </div>
    </aside>
</div>
</body>
</html>
