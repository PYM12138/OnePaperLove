<script>
    $(document).ready(function () {
        // 初始化 DataTable
        const table = $('#articleTable').DataTable({
            responsive: true,
            pageLength: 10,
            lengthChange: true,
            autoWidth: true,
            searching: true,
            ordering: true,
            info: true,
            paging: true,
            language: {
                search: "",
                searchPlaceholder: "🔍搜索...",
                lengthMenu: "每页显示 _MENU_ 条",
                info: "📖显示第 _START_ 至 _END_ 项结果，共 _TOTAL_ 项",
                infoEmpty: "❌无记录",
                zeroRecords: "⚠️未找到符合条件的数据",
                paginate: {
                    first: "首页",
                    last: "尾页",
                    previous: "<i class=\"fa fa-angle-double-left\" aria-hidden=\"true\"></i>",
                    next: "<i class=\"fa fa-angle-double-right\" aria-hidden=\"true\"></i>"
                }
            },
            data: [],
            columns: [
                { data: 'articleId' },
                {
                    data: 'articleTitle',
                    render: function (data, type, row) {
                        return `<a href="/article/${row.articleId}" class="article-title">${data}</a>`;
                    }
                },
                { data: 'categoryName' },
                {
                    data: 'tags',
                    render: function (data) {
                        return Array.isArray(data) ? data.map(tag => tag.tagName).join(' ') : '';
                    }
                },
                { data: 'articlePublishDate' },
                {
                    data: null,
                    render: function (data, type, row) {
                        return `
                            <button class="btn btn-outline-success btn-edit" data-id="${row.articleId}">编辑</button>
                            <button class="btn btn-outline-danger btn-delete" data-id="${row.articleId}">删除</button>
                        `;
                    }
                }
            ],
            rowCallback: function (row, data) {
                $(row).data('summary', data.articleSummary || '');
            }
        });

        // 加载文章数据（封装）
        function loadArticles() {
            $.ajax({
                url: '/findAllArticles',
                type: 'GET',
                dataType: 'json',
                data: {
                    pageNum: 1,
                    pageSize: 5000,
                    _ts: new Date().getTime()  // 防缓存
                },
                success: function (res) {
                    const articles = res.data.articles || [];
                    table.clear().rows.add(articles).draw();
                },
                error: function () {
                    alert("加载文章失败！");
                }
            });
        }

        // 初始加载
        loadArticles();

        // 展开摘要
        $('#articleTable tbody').on('click', 'tr', function (e) {
            if (!$(e.target).hasClass('btn-edit') &&
                !$(e.target).hasClass('btn-delete') &&
                !$(e.target).hasClass('article-title')) {

                const $next = $(this).next('.expand-row');
                if ($next.length) {
                    $next.toggleClass('d-none');
                } else {
                    const summary = $(this).data('summary');
                    if (summary) {
                        $(this).after(`
                            <tr class="expand-row d-none">
                                <td colspan="6" class="text-muted">${summary}</td>
                            </tr>
                        `).next('.expand-row').toggleClass('d-none');
                    }
                }
            }
        });

        // 编辑跳转
        $('#articleTable tbody').on('click', '.btn-edit', function (e) {
            e.stopPropagation();
            const articleId = $(this).data('id');
            window.location.href = '/admin/article/edit?articleId=' + articleId;
        });

        // 删除文章
        $('#articleTable tbody').on('click', '.btn-delete', function (e) {
            e.stopPropagation();
            const $button = $(this);
            const articleId = $button.data('id');
            if (!articleId || isNaN(articleId)) {
                alert('无效的文章 ID！');
                return;
            }

            if (!confirm("确定要删除这篇文章吗？")) return;

            $.post('/article/delete', { articleId: articleId }, function (res) {
                if (res.status===0) {
                    alert("删除成功！");
                    // 重新加载数据
                    loadArticles();
                } else {
                    alert("删除失败：" + (res.message || "未知错误"));
                }
            }, 'json').fail(function () {
                alert("删除请求失败！");
            });
        });

        // 激活当前菜单
        sidebar_active();
    });

    function sidebar_active() {
        const currentUrl = window.location.pathname;
        $('.nav-sidebar a').each(function () {
            const link = $(this).attr('href');
            if (link && currentUrl.endsWith(link)) {
                $(this).addClass('active');
                $(this).closest('.nav-item').addClass('menu-open');
                $(this).parents('.nav-treeview').prev('a').addClass('active');
                $(this).find('.fa-circle-o').removeClass('fa-circle-o').addClass('fa-check-circle-o');
            }
        });
    }
</script>
