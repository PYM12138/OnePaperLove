    function loadLogs(keyword = '') {
        $("#loading").show();  // <&#45;&#45; 搜索开始，显示 loading

            url: '/logs/search',
            method: 'GET',
            dataType: 'json',

                keyword: keyword

                    renderPagination(pageInfo); // <&#45;&#45; 新增，渲染分页

                } else {
                    alert('查询失败：' + (res.message || '未知错误'));
                }
            },
            error: function () {
                alert("请求失败，请检查网络或后端服务！");

            complete: function () {

    function renderTable(logs) {

            const row = `

                    <td>${log.userName}</td>
                    <td>${formatTimestamp(log.operationTime)}</td>
                    <td>${log.operationType}</td>
                    <td>${log.description}</td>
                </tr>
            `;
            tbody.append(row);

    //将Mybatis默认的时间戳转换为日期时间格式
    function formatTimestamp(timestamp) {

        const month = (date.getMonth() + 1).toString().padStart(2, '0');
        const day = date.getDate().toString().padStart(2, '0');
        const hour = date.getHours().toString().padStart(2, '0');
        const minute = date.getMinutes().toString().padStart(2, '0');

<script>
    $(function (){
        $("#logTable").DataTable({
            responsive:true,
            pageLength:10,
            lengthChange:true,
            order: [ [2, 'desc'] ],//这是按照第3行倒序排列的意思，不能这样写 会被thymeleaf解析，所以要写[ [] ]
            language: {
                search: "", // 去掉默认文字
                searchPlaceholder: "🔍搜索...",
                lengthMenu: "每页显示 _MENU_ 条",
                info: "📖显示第 _START_ 至 _END_ 项结果，共 _TOTAL_ 项",
                infoEmpty: "❌无记录",
                zeroRecords: "⚠️未找到符合条件的数据",
                paginate: {
                    first: "首页",
                    last: "尾页",
                    previous: " <i class=\"fa fa-angle-double-left\" aria-hidden=\"true\"></i>",
                    next: "<i class=\"fa fa-angle-double-right\" aria-hidden=\"true\"></i>"
                }
            },
            data:[],//等待ajax请求数据后自动填充
            columns:[
                {data:"id"},
                {data:"userName"},
                {
                    data:"operationTime",
                    render:function(data,type,row){
                        return formatTimestamp(data);
                    }
                },
                {data:"articleId"},
                {data:"operationType"},
                {data:"description"}
            ],

        })
        $.ajax({
            url:"/logs/search",
            method:"GET",
            dataType:"json",
            data:{
                pageNum:1,
                pageSize:5000
            },
            success:function(res){
                console.log(res);
                if(res.status===200&&res.data){
                    const logs=res.data.logs;
                    $("#logTable").DataTable().clear().rows.add(logs).draw();
                }
            },
            error:function(){
                alert("请求失败，请检查网络或后端服务！");
            }

        })
        sidebar_active();
    })

    function sidebar_active() {
        const currentUrl = window.location.pathname;
        $('.nav-sidebar a').each(function () {
            const link = $(this).attr('href');
            if (link && currentUrl.endsWith(link)) {
                $(this).addClass('active');
                $(this).closest('.nav-item').addClass('menu-open');
                $(this).parents('.nav-treeview').prev('a').addClass('active');
                // 修改图标为实心圆
                $(this).find('.fa-circle-o').removeClass('fa-circle-o').addClass('fa-check-circle-o');
            }
        });
    }

    //将Mybatis默认的时间戳转换为日期时间格式
    function formatTimestamp(timestamp) {
        const date = new Date(timestamp);
        const year = date.getFullYear();
        const month = (date.getMonth() + 1).toString().padStart(2, '0');
        const day = date.getDate().toString().padStart(2, '0');
        const hour = date.getHours().toString().padStart(2, '0');
        const minute = date.getMinutes().toString().padStart(2, '0');
        const second = date.getSeconds().toString().padStart(2, '0');
        return `${year}-${month}-${day} ${hour}:${minute}:${second}`;
    }



</script>
